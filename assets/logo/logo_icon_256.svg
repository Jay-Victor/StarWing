<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 飞机主体渐变 -->
    <linearGradient id="planeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#429CE3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    
    <!-- 激光渐变 -->
    <linearGradient id="laserGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#429CE3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:0" />
    </linearGradient>
    
    <!-- 光晕效果 -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,120,212,0.5);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,120,212,0);stop-opacity:0" />
    </radialGradient>
    
    <!-- 外发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- 强发光滤镜 -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆角方形 (WinUI3 风格) -->
  <rect x="8" y="8" width="240" height="240" rx="32" ry="32" fill="url(#bgGradient)" stroke="#0078D4" stroke-width="2" opacity="0.95"/>
  
  <!-- 外圈光晕 -->
  <circle cx="128" cy="128" r="130" fill="url(#glowGradient)" opacity="0.6"/>
  
  <!-- 背景星星 -->
  <g fill="#FFFFFF" opacity="0.8">
    <circle cx="50" cy="50" r="1.5" />
    <circle cx="80" cy="40" r="1" />
    <circle cx="190" cy="45" r="2" />
    <circle cx="220" cy="65" r="1" />
    <circle cx="40" cy="90" r="1" />
    <circle cx="230" cy="105" r="1.5" />
    <circle cx="50" cy="180" r="1" />
    <circle cx="210" cy="195" r="1.5" />
    <circle cx="65" cy="220" r="1" />
    <circle cx="200" cy="230" r="2" />
    <circle cx="105" cy="35" r="1" />
    <circle cx="170" cy="40" r="1.5" />
  </g>
  
  <!-- 激光束 (从飞机底部向上) -->
  <g filter="url(#strongGlow)">
    <polygon points="128,100 122,75 128,55 134,75" fill="url(#laserGradient)" opacity="0.9"/>
    <polygon points="122,102 117,82 122,65 126,82" fill="url(#laserGradient)" opacity="0.7"/>
    <polygon points="134,102 139,82 134,65 130,82" fill="url(#laserGradient)" opacity="0.7"/>
  </g>
  
  <!-- 飞机主体 (俯视战斗机) -->
  <g filter="url(#glow)" transform="translate(0, 5)">
    <!-- 机身 -->
    <ellipse cx="128" cy="128" rx="10" ry="35" fill="url(#planeGradient)" />
    
    <!-- 主机翼 -->
    <path d="M 128 120 L 90 150 L 85 155 L 128 145 L 171 155 L 166 150 L 128 120" fill="url(#planeGradient)" />
    
    <!-- 尾翼 -->
    <path d="M 128 155 L 115 170 L 110 175 L 128 168 L 146 175 L 141 170 L 128 155" fill="url(#planeGradient)" />
    
    <!-- 机头 -->
    <ellipse cx="128" cy="105" rx="8" ry="12" fill="url(#planeGradient)" />
    
    <!-- 驾驶舱 -->
    <ellipse cx="128" cy="118" rx="5" ry="8" fill="#1a1a3a" stroke="#429CE3" stroke-width="1.5" />
    <ellipse cx="128" cy="118" rx="3" ry="5" fill="url(#laserGradient)" opacity="0.6" />
  </g>
  
  <!-- 飞机高光 -->
  <g opacity="0.4">
    <ellipse cx="124" cy="125" rx="2" ry="8" fill="#FFFFFF" />
    <path d="M 95 148 L 90 153" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 161 148 L 166 153" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
  </g>
  
  <!-- 内圈光晕 -->
  <circle cx="128" cy="128" r="55" fill="url(#glowGradient)" opacity="0.3"/>
  
  <!-- 外边框装饰 -->
  <rect x="8" y="8" width="240" height="240" rx="32" ry="32" fill="none" stroke="rgba(0,120,212,0.2)" stroke-width="1" opacity="0.3"/>
</svg>
